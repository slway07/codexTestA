<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>타로 리딩 룸</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>🔮 타로 리딩 룸</h1>
        <p class="subtitle">카드를 섞고 펼친 뒤 직접 선택해 리딩을 진행하세요.</p>
      </header>

      <section class="card panel">
        <h2>1) 리딩 방식 선택</h2>
        <div class="spread-picker" id="spreadPicker">
          <button class="spread-btn active" data-spread="one">원카드</button>
          <button class="spread-btn" data-spread="three">3카드 (과거·현재·미래)</button>
        </div>

        <h2>2) 리딩 분야 선택</h2>
        <div class="category-picker" id="categoryPicker">
          <button class="category-btn" data-category="love">연애</button>
          <button class="category-btn" data-category="career">일·커리어</button>
          <button class="category-btn" data-category="money">금전</button>
          <button class="category-btn active" data-category="general">일반</button>
        </div>

        <div class="action-row">
          <button id="shuffleBtn">카드 섞고 펼치기</button>
        </div>
        <p id="instruction" class="instruction">리딩 방식을 고른 뒤 카드를 섞어주세요.</p>
      </section>

      <section class="card panel" id="tablePanel" hidden>
        <h2>3) 카드를 선택하세요</h2>
        <div id="spreadSlots" class="spread-slots"></div>
        <div id="deckArea" class="deck-area"></div>
      </section>

      <section class="card panel" id="resultPanel" hidden>
        <h2>리딩 결과</h2>
        <div id="result"></div>
      </section>

      <section class="card panel">
        <h2>최근 리딩</h2>
        <ul id="history"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
