<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>타로 MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>🔮 타로 MVP (No-LLM First)</h1>
        <p class="subtitle">질문을 입력하고 카드를 뽑아 오늘의 메시지를 확인하세요.</p>
      </header>

      <section class="card panel">
        <label for="question">질문 (선택)</label>
        <textarea id="question" rows="3" placeholder="예: 이번 달 이직 운이 궁금해요."></textarea>

        <label for="category">질문 카테고리</label>
        <select id="category">
          <option value="love">연애</option>
          <option value="career">일·커리어</option>
          <option value="money">금전</option>
          <option value="general" selected>일반</option>
        </select>

        <button id="drawBtn">카드 뽑기</button>
      </section>

      <section class="card panel" id="resultPanel" hidden>
        <h2>리딩 결과</h2>
        <div id="result"></div>
      </section>

      <section class="card panel">
        <h2>최근 리딩</h2>
        <ul id="history"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
